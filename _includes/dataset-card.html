{% include base_path %}

{% if post.id %}
  {% assign title = post.title | markdownify | remove: "<p>" | remove: "</p>" %}
{% else %}
  {% assign title = post.title %}
{% endif %}

<div class="list-item__body">
  <div class="list-item__title">
    <a href="{{ base_path }}{{ post.url }}" class="model-card__title" rel="permalink">{{ title }}</a>
  </div>
  {% if post.excerpt %}
  <div class="model-card__excerpt">{{ post.excerpt | strip_html | truncatewords: 20 }}</div>
  {% endif %}
</div>

<div class="list-item__metrics">
  <div class="metric">
    <span class="metric-icon">◉</span>
    <span class="metric-count views-counter">—</span>
  </div>
</div>
