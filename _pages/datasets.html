---
layout: archive
title: "Datasets"
permalink: /datasets/
author_profile: true
---

{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/models.css">

<div class="models-page">
  <ul class="content-list" id="datasets-container">
    {% for post in site.datasets %}
      <li class="list-item dataset-card"
          data-slug="{{ post.title | slugify }}"
          data-tags="{{ post.tags | join: ',' | downcase }}"
          data-name="{{ post.title }}">
        {% include dataset-card.html %}
      </li>
    {% endfor %}
  </ul>

  <script type="application/json" id="datasets-github-data">
    {{ site.data.datasets | jsonify }}
  </script>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.views-counter').forEach(function(el) {
    var slug = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
    if (!slug) return;
    fetch('https://api.counterapi.dev/v1/smolhub-yuvraj/' + slug + '/')
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d && d.count != null) el.textContent = Number(d.count).toLocaleString(); })
      .catch(function() { el.textContent = ''; });
  });
});
</script>
