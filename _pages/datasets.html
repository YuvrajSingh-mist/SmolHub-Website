---
layout: archive
title: "Datasets"
permalink: /datasets/
author_profile: true
---

{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/models.css">

<div class="models-page">
  <ul class="content-list" id="datasets-container">
    {% for post in site.datasets %}
      <li class="list-item dataset-card"
          data-slug="{{ post.title | slugify }}"
          data-tags="{{ post.tags | join: ',' | downcase }}"
          data-name="{{ post.title }}">
        {% include dataset-card.html %}
      </li>
    {% endfor %}
  </ul>

  <script type="application/json" id="datasets-github-data">
    {{ site.data.datasets | jsonify }}
  </script>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var els = document.querySelectorAll('.views-counter');
  var slugs = [];
  els.forEach(function(el) {
    var s = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
    if (s) slugs.push(s);
  });
  if (!slugs.length) return;
  fetch('/api/views?slugs=' + slugs.map(encodeURIComponent).join(','))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      els.forEach(function(el) {
        var s = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
        if (s && data[s] != null) el.textContent = Number(data[s]).toLocaleString();
      });
    })
    .catch(function() {});
});
</script>
