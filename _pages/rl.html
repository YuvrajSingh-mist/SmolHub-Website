---
layout: archive
title: "RL From Scratch"
permalink: /rl-list/
author_profile: true
---

{% include base_path %}

<link rel="stylesheet" href="{{ '/assets/css/models.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<div class="models-page">
  <ul class="content-list" id="rl-container">
    {% for post in site.rl %}
      <li class="list-item rl-wrapper"
          data-slug="{{ post.title | slugify }}"
          data-category="{{ post.category | downcase | replace: '/', '-' | replace: ' ', '-' }}"
          data-categories="{{ post.categories | join: ',' | downcase | replace: '/', '-' | replace: ' ', '-' }}"
          data-name="{{ post.title }}"
          data-framework="{{ post.framework }}"
          data-environment="{{ post.environment }}"
          data-date="{{ post.date | date: '%Y-%m-%d' }}">
        {% include rl-card.html %}
      </li>
    {% endfor %}
  </ul>

  <div id="no-results" class="no-results-message" style="display: none;">
    <h3>No RL algorithms found</h3>
    <p>Try adjusting your search terms or filters.</p>
  </div>

  <script type="application/json" id="rl-github-data">
    {{ site.data.rl | jsonify }}
  </script>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // View counter - updates only the count span, icon is separate
  var els = document.querySelectorAll('.views-counter');
  var slugs = [];
  els.forEach(function(el) {
    var s = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
    if (s) slugs.push(s);
  });
  if (!slugs.length) return;
  fetch('/api/views?slugs=' + slugs.map(encodeURIComponent).join(','))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      els.forEach(function(el) {
        var s = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
        if (s && data[s] != null) el.textContent = Number(data[s]).toLocaleString();
      });
    })
    .catch(function() {});
});
</script>
