permalink: /smolhub/
author_profile: true
---

{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/models.css">

<style>
  /* hide the empty page__title space */
  h1.page__title:empty { display: none; }

  .smolhub-header {
    margin-bottom: 1.75rem;
    padding-bottom: 1rem;
  }
  .smolhub-header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: 2rem;
    color: var(--accent, #8a7355);
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }
  .smolhub-header p {
    font-size: 0.9rem;
    color: var(--text-secondary, #737373);
    margin: 0;
  }
</style>

<div class="smolhub-header">
  <h1>SmolHub Playground</h1>
  <p>Small-scale models, proof-of-concepts, and AI experiments.</p>
</div>

<div class="models-page">
  <ul class="content-list" id="smolhub-container">
    {% for post in site.smolhub %}
      <li class="list-item smolhub-wrapper"
          data-slug="{{ post.title | slugify }}"
          data-tags="{{ post.tags | join: ',' | downcase }}"
          data-name="{{ post.title }}"
          data-date="{{ post.date | date: '%Y-%m-%d' }}">
        {% include smolhub-card.html %}
      </li>
    {% endfor %}
  </ul>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.views-counter').forEach(function(el) {
    var slug = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
    if (!slug) return;
    fetch('https://api.counterapi.dev/v1/smolhub-yuvraj/' + slug)
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d && d.count != null) el.textContent = Number(d.count).toLocaleString(); })
      .catch(function() { el.textContent = ''; });
  });
});
</script>
