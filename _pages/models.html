---
layout: archive
title: "Paper Replications"
permalink: /models/
author_profile: true
---

{% include base_path %}

<link rel="stylesheet" href="{{ '/assets/css/models.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<div class="models-page">
  <ul class="content-list" id="models-container">
    {% for post in site.models %}
      <li class="list-item model-wrapper"
          data-slug="{{ post.title | slugify }}"
          data-category="{{ post.category | downcase | replace: '/', '-' | replace: ' ', '-' }}"
          data-name="{{ post.title }}"
          data-date="{{ post.date | date: '%Y-%m-%d' }}">
        {% include model-card.html %}
      </li>
    {% endfor %}
  </ul>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // View counter - updates only the count span, icon is separate
  document.querySelectorAll('.views-counter').forEach(function(el) {
    var slug = el.closest('.list-item') && el.closest('.list-item').dataset.slug;
    if (!slug) return;
    fetch('https://api.counterapi.dev/v1/smolhub-yuvraj/' + slug + '/up')
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d && d.count != null) el.textContent = Number(d.count).toLocaleString(); })
      .catch(function() { el.textContent = ''; });
  });
});
</script>
