---
layout: single
---

<div class="impl-header">
  <div class="impl-tags">
    {% if page.category %}<span class="impl-tag">{{ page.category }}</span>{% endif %}
    {% if page.framework %}<span class="impl-tag">{{ page.framework }}</span>{% endif %}
    {% if page.environment %}<span class="impl-tag">{{ page.environment }}</span>{% endif %}
    {% if page.stars %}<span class="impl-tag">★ {{ page.stars }}</span>{% endif %}
  </div>
  {% if page.github_url %}
  <a href="{{ page.github_url }}" target="_blank" rel="noopener" class="impl-link">GitHub →</a>
  {% endif %}
</div>

{{ content }}
